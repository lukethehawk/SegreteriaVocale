<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SegreteriaVocale</title>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <main class="app-shell">
        <section class="workspace" aria-labelledby="app-title">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Google Cloud Text-to-Speech</p>
                    <h1 id="app-title">SegreteriaVocale</h1>
                </div>
                <button class="icon-button" id="themeToggle" type="button" aria-label="Cambia tema" title="Cambia tema">
                    <span aria-hidden="true">☀</span>
                </button>
            </header>

            <form class="composer" id="voiceForm">
                <div class="api-key-row">
                    <label class="field">
                        <span>Chiave API Google</span>
                        <input id="apiKeyInput" type="password" autocomplete="off" placeholder="Incolla la tua API key Google TTS">
                    </label>
                    <button class="secondary" id="saveApiKeyButton" type="button">Salva chiave</button>
                    <button class="secondary danger" id="clearApiKeyButton" type="button">Rimuovi</button>
                </div>

                <label class="field">
                    <span>Testo della segreteria</span>
                    <textarea id="textInput" maxlength="5000" placeholder="Scrivi qui il messaggio da trasformare in audio..." required></textarea>
                </label>

                <div class="meta-row">
                    <span id="charCounter">Caratteri: 0</span>
                    <span id="usageCounter">Inviati: 0</span>
                </div>

                <div class="grid-2">
                    <label class="field">
                        <span>Tipo voce</span>
                        <select id="voiceTypeFilter">
                            <option value="all">Tutte le voci</option>
                            <option value="Chirp 3 HD">Chirp 3 HD</option>
                            <option value="Chirp HD">Chirp HD</option>
                            <option value="Neural2">Neural2</option>
                            <option value="Wavenet">Wavenet</option>
                            <option value="Standard">Standard</option>
                        </select>
                    </label>

                    <label class="field">
                        <span>Voce</span>
                        <select id="voiceSelect" required>
                            <option value="">Caricamento voci...</option>
                        </select>
                    </label>
                </div>

                <div class="grid-2">
                    <label class="field">
                        <span>Formato sorgente</span>
                        <select id="encodingSelect">
                            <option value="MP3">MP3</option>
                            <option value="LINEAR16">LINEAR16</option>
                        </select>
                    </label>

                    <label class="field">
                        <span>Musica di sottofondo</span>
                        <input type="file" id="musicUpload" accept="audio/*">
                    </label>
                </div>

                <label class="field">
                    <span>Volume musica</span>
                    <input id="musicVolume" type="range" min="0" max="1" step="0.05" value="0.35">
                    <small id="musicVolumeValue">35%</small>
                </label>

                <div class="actions">
                    <button class="secondary" id="previewButton" type="button">Anteprima voce</button>
                    <button id="generateButton" type="submit">Genera audio</button>
                </div>
            </form>
        </section>

        <aside class="output-panel" aria-label="Risultato audio">
            <div class="status-box" id="statusBox" role="status">Pronto.</div>
            <audio id="audioPlayer" controls></audio>
            <a class="download-link" id="downloadButton" download="segreteria.wav" href="#">Scarica WAV</a>
            <div class="voice-details" id="voiceDetails"></div>
        </aside>
    </main>

    <script src="src/app.js" defer></script>
</body>
</html>
